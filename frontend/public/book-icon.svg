<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Book cover -->
  <rect x="14" y="8" width="36" height="48" rx="2" fill="url(#bookGradient)"/>

  <!-- Book spine shadow -->
  <rect x="14" y="8" width="4" height="48" fill="rgba(0,0,0,0.2)"/>

  <!-- Book pages -->
  <rect x="18" y="10" width="30" height="44" rx="1" fill="#F9FAFB"/>

  <!-- Page lines -->
  <line x1="22" y1="18" x2="44" y2="18" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="24" x2="44" y2="24" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="30" x2="44" y2="30" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="36" x2="38" y2="36" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bookmark -->
  <path d="M 38 8 L 38 20 L 42 17 L 46 20 L 46 8 Z" fill="#EF4444"/>

  <!-- Book bottom edge -->
  <rect x="14" y="54" width="36" height="2" rx="1" fill="rgba(0,0,0,0.15)"/>
</svg>
