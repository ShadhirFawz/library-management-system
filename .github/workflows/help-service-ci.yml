name: help-service-ci

on:
  push:
    paths:
      - "backend/help-service/**"
      - ".github/workflows/help-service-ci.yml"
  pull_request:
    paths:
      - "backend/help-service/**"
      - ".github/workflows/help-service-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/help-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/help-service/package-lock.json
      - run: npm ci
      - run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t help-service:ci ./backend/help-service

