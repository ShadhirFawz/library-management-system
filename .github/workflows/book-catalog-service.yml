name: Build & Push book-catalog-service

on:
  push:
    branches: [master]
    paths:
      - "backend/book-catalog-service/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/book-catalog-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/book-catalog-service:latest
