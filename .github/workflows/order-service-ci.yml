name: order-service-ci

on:
  push:
    paths:
      - "backend/order-service/**"
      - ".github/workflows/order-service-ci.yml"
  pull_request:
    paths:
      - "backend/order-service/**"
      - ".github/workflows/order-service-ci.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/order-service/package-lock.json
      - run: npm ci
      - name: Check for syntax errors
        run: node --check server.js

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/order-service
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://localhost:27017/order-service-test
      JWT_SECRET: test-secret-key
      USER_SERVICE_URL: http://localhost:5001
      BOOK_SERVICE_URL: http://localhost:5002
      DEFAULT_BORROW_DAYS: 14
      DEFAULT_FINE_PER_DAY: 0.50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/order-service/package-lock.json
      - run: npm ci
      - run: npm test
        continue-on-error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t order-service:ci ./backend/order-service
      - name: Test Docker image
        run: |
          docker run -d --name order-test -p 5003:5003 \
            -e MONGO_URI=mongodb://host.docker.internal:27017/test \
            -e JWT_SECRET=test-secret \
            -e USER_SERVICE_URL=http://localhost:5001 \
            -e BOOK_SERVICE_URL=http://localhost:5002 \
            order-service:ci || true
          sleep 5
          docker logs order-test || true
          docker stop order-test || true
          docker rm order-test || true

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/order-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest
            ${{ secrets.DOCKER_USERNAME }}/order-service:${{ github.sha }}
