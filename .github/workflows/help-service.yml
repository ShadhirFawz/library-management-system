name: Build & Push help-service

on:
  push:
    branches: [master]
    paths:
      - "backend/help-service/**"

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/help-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/help-service:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name help-service \
              --resource-group sliit-group-2026 \
              --image ${{ secrets.DOCKERHUB_USERNAME }}/help-service:latest
