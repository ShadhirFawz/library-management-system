services:
  user-service:
    build:
      context: ./backend/user-service
    env_file:
      - ./backend/user-service/.env
    ports:
      - "5001:5001"

  book-catalog-service:
    build:
      context: ./backend/book-catalog-service
    env_file:
      - ./backend/book-catalog-service/.env
    ports:
      - "5002:5002"
    depends_on:
      - user-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  order-service:
    build:
      context: ./backend/order-service
    env_file:
      - ./backend/order-service/.env
    ports:
      - "5003:5003"
    depends_on:
      - user-service
      - book-catalog-service
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  help-service:
    build:
      context: ./backend/help-service
    env_file:
      - ./backend/help-service/.env
    ports:
      - "5004:5004"
    depends_on:
      - user-service
